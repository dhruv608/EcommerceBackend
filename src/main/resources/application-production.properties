# Production Configuration
server.port=8080
server.address=0.0.0.0

# ===============================
# DATABASE (Neon PostgreSQL - Production)
# ===============================
spring.datasource.url=jdbc:postgresql://ep-green-leaf-aimjvu4j-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&user=neondb_owner&password=npg_7EbcpYaZXU0r
spring.datasource.username=neondb_owner
spring.datasource.password=${DATABASE_PASSWORD:npg_7EbcpYaZXU0r}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ===============================
# JPA / HIBERNATE - Production
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# LOGGING - Production
# ===============================
logging.level.root=WARN
logging.level.com.store.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# PERFORMANCE
# ===============================
spring.cache.type=simple
server.servlet.session.timeout=30m

# ===============================
# MANAGEMENT ENDPOINTS
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
